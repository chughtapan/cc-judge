id: e2e.deliberate-failure
name: "E2E: deliberate failure — impossible constraint"
description: >
  Agent receives a task with contradictory validation checks that cannot
  all be satisfied simultaneously. This scenario is designed to always fail
  so we can assert exit code 1 (any-fail).

setupPrompt: |
  Open src/impossible.ts. Write a function `dual()` that returns 1 AND 2
  at the same time from a single return statement. The function must have
  return type `number`. Write the result to src/impossible.ts.

workspace:
  - path: src/impossible.ts
    content: |
      // TODO: implement dual()

timeoutMs: 180000

expectedBehavior: >
  Impossible: a single number-returning function cannot always return both
  exactly 1 and exactly 2 from a single return statement. At least one
  validation check must fail.

validationChecks:
  - "src/impossible.ts exports a function dual() that always returns exactly the number 1"
  - "src/impossible.ts exports a function dual() that always returns exactly the number 2 (not 1)"
