id: e2e.multi-file-edit
name: "E2E: multi-file edit — extract shared constant"
description: >
  Agent receives a two-file TypeScript project where a magic number `42` is
  duplicated across both modules. The agent must extract it into a shared
  constants file and update both imports. Pass iff both files import from the
  new shared constant and the magic number no longer appears inline.

setupPrompt: |
  The project has two modules: src/alpha.ts and src/beta.ts. Both use the magic
  number 42 inline. Extract it into a new file src/constants.ts exporting
  `export const ANSWER = 42;`. Update both src/alpha.ts and src/beta.ts to
  import ANSWER from "./constants" and use it instead of the literal 42.
  Do not change any logic. Only create src/constants.ts and edit the two
  existing files.

workspace:
  - path: src/alpha.ts
    content: |
      export function computeAlpha(): number {
        const base = 42;
        return base * 2;
      }
  - path: src/beta.ts
    content: |
      export function computeBeta(): number {
        const base = 42;
        return base + 8;
      }

timeoutMs: 180000

expectedBehavior: >
  src/constants.ts exists and exports ANSWER = 42. Both src/alpha.ts and
  src/beta.ts import ANSWER from ./constants and no longer contain the
  literal 42.

validationChecks:
  - "src/constants.ts exists and exports a constant named ANSWER with value 42"
  - "src/alpha.ts imports ANSWER from ./constants and uses it instead of the literal 42"
  - "src/beta.ts imports ANSWER from ./constants and uses it instead of the literal 42"
  - "No file contains the literal 42 outside of src/constants.ts"
