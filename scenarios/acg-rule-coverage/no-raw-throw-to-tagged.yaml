id: acg-rule-coverage.no-raw-throw-to-tagged
name: "ACG rule coverage: raw throw -> tagged error inside Effect.gen"
description: >
  Agent receives a TypeScript module containing an Effect.gen function that
  signals failure with `throw new Error("bad input")`. The agent is asked to
  refactor the failure path to use a tagged error via Effect.fail, preserving
  the Effect signature. Pass iff the refactor replaces the raw throw with a
  Data.TaggedError subclass + Effect.fail; fail iff a raw throw remains or
  the Effect signature is dropped.

setupPrompt: |
  Open src/validate.ts. It contains one Effect.gen function whose failure
  path uses `throw new Error("bad input")`. Refactor that failure path to
  use a tagged error instead:
    - Declare a tagged error class with `class <Name>Error extends Data.TaggedError("<Name>Error")<{ readonly message: string }> {}`.
    - Replace the raw throw with `yield* Effect.fail(new <Name>Error({ message: "bad input" }))`.
    - Keep the function's Effect return signature; do not change the exported function name or parameters.
    - Do not add any other files. Only edit src/validate.ts.
  Write the final file back to src/validate.ts with your changes applied.

workspace:
  - path: src/validate.ts
    content: |
      import { Effect } from "effect";

      export const validate = (input: string) =>
        Effect.gen(function* () {
          if (input.length === 0) {
            throw new Error("bad input");
          }
          return yield* Effect.succeed(input.toUpperCase());
        });

timeoutMs: 180000

expectedBehavior: >
  src/validate.ts contains a Data.TaggedError subclass and replaces the raw
  throw with Effect.fail on that tagged error. No `throw new Error(` remains
  inside the Effect.gen body. The validate export still returns an Effect.

validationChecks:
  - "src/validate.ts defines a class extending Data.TaggedError (e.g. class BadInputError extends Data.TaggedError(\"BadInputError\")<...>)"
  - "src/validate.ts uses Effect.fail with a new instance of that tagged error class"
  - "src/validate.ts no longer contains the substring 'throw new Error' inside the validate function body"
  - "The exported validate function still returns an Effect (Effect.gen or equivalent); its exported name is unchanged"

metadata:
  rulePack: agent-code-guard
  rule: no-raw-throw-in-effect-gen
  dogfoodRun: "2026-04-18-first-dogfood"
