workspaceDiff:
  changed:
    - path: src/validate.ts
      before: |
        import { Effect } from "effect";

        export const validate = (input: string) =>
          Effect.gen(function* () {
            if (input.length === 0) {
              throw new Error("bad input");
            }
            return yield* Effect.succeed(input.toUpperCase());
          });
      after: |
        import { Effect, Data } from "effect";

        class BadInputError extends Data.TaggedError("BadInputError")<{ readonly message: string }> {}

        export const validate = (input: string) =>
          Effect.gen(function* () {
            if (input.length === 0) {
              yield* Effect.fail(new BadInputError({ message: "bad input" }));
            }
            return yield* Effect.succeed(input.toUpperCase());
          });
expectedBehavior: >
  src/validate.ts defines a Data.TaggedError subclass and replaces the raw
  throw with Effect.fail on that tagged error class. No raw throw remains.
validationChecks:
  - "src/validate.ts defines a class extending Data.TaggedError"
  - "src/validate.ts uses Effect.fail with a tagged error instance"
  - "src/validate.ts no longer contains 'throw new Error' inside the validate function body"
